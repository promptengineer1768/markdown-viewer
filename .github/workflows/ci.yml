name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'AGENTS.md'
      - '.clang-format'
      - '.clang-tidy'
      - '.vscode/**'
      - '.idea/**'
      - 'tools/local/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'AGENTS.md'
      - '.clang-format'
      - '.clang-tidy'
      - '.vscode/**'
      - '.idea/**'
      - 'tools/local/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  format-check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install clang-format-19
        uses: ./.github/actions/install-linux-deps
        with:
          packages: clang-format-19
      - name: Check formatting
        run: |
          find src include tests \( -name "*.cc" -o -name "*.h" \) -print0 | xargs -0 clang-format-19 --dry-run --Werror --style=Google

  configure-check:
    needs: format-check
    strategy:
      matrix:
        include:
          - preset: linux-clang-debug
            os: ubuntu-24.04
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        uses: ./.github/actions/install-linux-deps
        with:
          packages: cmake ninja-build clang-19 clang-tools-19 libwxgtk3.2-dev libgtest-dev
      - name: Configure
        shell: bash
        run: |
          cmake --preset ${{ matrix.preset }} -DCMAKE_C_COMPILER=clang-19 -DCMAKE_CXX_COMPILER=clang++-19

  windows-msvc:
    # CI_CONTRACT: windows-msvc-debug@1
    needs: configure-check
    runs-on: windows-latest
    env:
      VCPKG_INSTALLATION_ROOT: C:\vcpkg
      SCCACHE_DIR: ${{ github.workspace }}\.sccache-msvc
      SCCACHE_CACHE_SIZE: 2G
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ilammy/msvc-dev-cmd@a102174a2b586eec2ea151a69e6fd14404a8ce7c # v1.13.0
        with:
          arch: x64

      - name: Install tools (if missing)
        shell: pwsh
        run: |
          if (-not (Get-Command cmake -ErrorAction SilentlyContinue)) {
            choco install cmake -y
          }
          if (-not (Get-Command ninja -ErrorAction SilentlyContinue)) {
            choco install ninja -y
          }
          if (-not (Get-Command sccache -ErrorAction SilentlyContinue)) {
            choco install sccache -y
          }
          cmake --version
          ninja --version
          sccache --version

      - name: Bootstrap vcpkg
        uses: ./.github/actions/bootstrap-vcpkg
        with:
          vcpkg_root: ${{ env.VCPKG_INSTALLATION_ROOT }}

      - name: Cache sccache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: sccache-windows-msvc-${{ hashFiles('src/**/*.cc', 'include/**/*.h', 'tests/**/*.cc', 'CMakeLists.txt', 'CMakePresets.json') }}
          restore-keys: sccache-windows-msvc-

      - name: Reset sccache stats
        run: sccache --zero-stats

      - name: Configure
        run: cmake --preset windows-msvc-debug -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache -DCMAKE_MSVC_DEBUG_INFORMATION_FORMAT=Embedded -DCMAKE_C_FLAGS_DEBUG=/Z7 -DCMAKE_CXX_FLAGS_DEBUG=/Z7

      - name: Build
        run: cmake --build --preset build-windows-msvc-debug

      - name: Verify standalone binary (no bundled DLLs)
        shell: pwsh
        run: |
          $dlls = Get-ChildItem "build/windows-msvc-debug/bin" -Filter *.dll -ErrorAction SilentlyContinue
          if ($dlls) {
            $dlls | ForEach-Object { Write-Host $_.Name }
            throw "Expected standalone Windows build (no bundled DLLs)."
          }

      - name: Test
        run: ctest --preset test-windows-msvc-debug

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats

  windows-clangcl:
    # CI_CONTRACT: windows-clangcl-debug@1
    needs: configure-check
    runs-on: windows-latest
    env:
      VCPKG_INSTALLATION_ROOT: C:\vcpkg
      SCCACHE_DIR: ${{ github.workspace }}\.sccache-clangcl
      SCCACHE_CACHE_SIZE: 2G
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ilammy/msvc-dev-cmd@a102174a2b586eec2ea151a69e6fd14404a8ce7c # v1.13.0
        with:
          arch: x64

      - name: Install tools (if missing)
        shell: pwsh
        run: |
          if (-not (Get-Command cmake -ErrorAction SilentlyContinue)) {
            choco install cmake -y
          }
          if (-not (Get-Command ninja -ErrorAction SilentlyContinue)) {
            choco install ninja -y
          }
          if (-not (Get-Command clang-cl -ErrorAction SilentlyContinue)) {
            choco install llvm -y
          }
          if (-not (Get-Command sccache -ErrorAction SilentlyContinue)) {
            choco install sccache -y
          }
          cmake --version
          ninja --version
          sccache --version

      - name: Bootstrap vcpkg
        uses: ./.github/actions/bootstrap-vcpkg
        with:
          vcpkg_root: ${{ env.VCPKG_INSTALLATION_ROOT }}

      - name: Cache sccache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: sccache-windows-clangcl-${{ hashFiles('src/**/*.cc', 'include/**/*.h', 'tests/**/*.cc', 'CMakeLists.txt', 'CMakePresets.json') }}
          restore-keys: sccache-windows-clangcl-

      - name: Reset sccache stats
        run: sccache --zero-stats

      - name: Configure
        run: cmake --preset windows-clangcl-debug -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache -DCMAKE_MSVC_DEBUG_INFORMATION_FORMAT=Embedded -DCMAKE_C_FLAGS_DEBUG=/Z7 -DCMAKE_CXX_FLAGS_DEBUG=/Z7

      - name: Build
        run: cmake --build --preset build-windows-clangcl-debug

      - name: Verify standalone binary (no bundled DLLs)
        shell: pwsh
        run: |
          $dlls = Get-ChildItem "build/windows-clangcl-debug/bin" -Filter *.dll -ErrorAction SilentlyContinue
          if ($dlls) {
            $dlls | ForEach-Object { Write-Host $_.Name }
            throw "Expected standalone Windows build (no bundled DLLs)."
          }

      - name: Test
        run: ctest --preset test-windows-clangcl-debug

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats

  windows-gcc:
    # CI_CONTRACT: windows-gcc-debug@1
    needs: configure-check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup MSYS2
        uses: msys2/setup-msys2@cafece8e6baf9247cf9b1bf95097b0b983cc558d # v2.31.0
        with:
          msystem: UCRT64
          update: true
          install: mingw-w64-ucrt-x86_64-gcc mingw-w64-ucrt-x86_64-cmake mingw-w64-ucrt-x86_64-ninja mingw-w64-ucrt-x86_64-wxwidgets-msw mingw-w64-ucrt-x86_64-gtest

      - name: Configure
        shell: msys2 {0}
        run: cmake --preset windows-gcc-debug

      - name: Build
        shell: msys2 {0}
        run: cmake --build --preset build-windows-gcc-debug

      - name: Test
        shell: msys2 {0}
        run: ctest --preset test-windows-gcc-debug

  linux-clang:
    # CI_CONTRACT: linux-clang-debug@1
    needs: configure-check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install dependencies
        uses: ./.github/actions/install-linux-deps
        with:
          packages: cmake ninja-build clang-19 clang-tools-19 libwxgtk3.2-dev libgtk-3-dev libgtest-dev rpm file imagemagick

      - name: Configure
        run: cmake --preset linux-clang-debug -DCMAKE_C_COMPILER=clang-19 -DCMAKE_CXX_COMPILER=clang++-19

      - name: Build
        run: cmake --build --preset build-linux-clang-debug

      - name: Test
        run: ctest --preset test-linux-clang-debug

      - name: Package (CPack)
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        run: |
          cd build/linux-clang-debug
          cpack -G "TGZ;DEB;RPM"

      - name: Package (AppImage)
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        env:
          LINUXDEPLOY_VERSION: 1-alpha-20251107-1
          LINUXDEPLOY_SHA256: c20cd71e3a4e3b80c3483cef793cda3f4e990aca14014d23c544ca3ce1270b4d
        run: |
          LINUXDEPLOY_URL="https://github.com/linuxdeploy/linuxdeploy/releases/download/${LINUXDEPLOY_VERSION}/linuxdeploy-x86_64.AppImage"
          FINAL_URL="$(curl --fail --silent --show-error --location --proto '=https' --proto-redir '=https' --tlsv1.2 --retry 3 --output linuxdeploy-x86_64.AppImage --write-out '%{url_effective}' "${LINUXDEPLOY_URL}")"
          case "${FINAL_URL}" in
            https://github.com/*|https://objects.githubusercontent.com/*|https://release-assets.githubusercontent.com/*)
              ;;
            *)
              echo "Unexpected linuxdeploy download redirect target: ${FINAL_URL}" >&2
              exit 1
              ;;
          esac
          echo "${LINUXDEPLOY_SHA256}  linuxdeploy-x86_64.AppImage" | sha256sum -c -
          chmod +x linuxdeploy-x86_64.AppImage
          mkdir -p AppDir/usr/bin
          cp build/linux-clang-debug/bin/markdown_viewer AppDir/usr/bin/
          mkdir -p AppDir/usr/share/applications
          cp resources/markdown-viewer.desktop AppDir/usr/share/applications/
          if command -v magick >/dev/null 2>&1; then
            magick resources/icon.png -resize 256x256^ -gravity center -extent 256x256 AppDir/markdown-viewer.png
          else
            convert resources/icon.png -resize 256x256^ -gravity center -extent 256x256 AppDir/markdown-viewer.png
          fi
          export APPIMAGE_EXTRACT_AND_RUN=1
          ./linuxdeploy-x86_64.AppImage --appdir AppDir -e AppDir/usr/bin/markdown_viewer -d resources/markdown-viewer.desktop -i AppDir/markdown-viewer.png --output appimage
          mkdir -p dist/linux
          mv Markdown_Viewer*.AppImage dist/linux/ 2>/dev/null || mv markdown-viewer*.AppImage dist/linux/ 2>/dev/null || true
          mv dist/*.tar.gz dist/linux/ 2>/dev/null || true
          mv dist/*.deb dist/linux/ 2>/dev/null || true
          mv dist/*.rpm dist/linux/ 2>/dev/null || true

      - name: Upload Artifacts
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: linux-clang-packages
          path: dist/linux/*

  linux-gcc:
    needs: configure-check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install dependencies
        uses: ./.github/actions/install-linux-deps
        with:
          packages: cmake ninja-build gcc-13 g++-13 libwxgtk3.2-dev libgtk-3-dev libgtest-dev

      - name: Configure
        run: cmake --preset linux-gcc-debug -DCMAKE_C_COMPILER=gcc-13 -DCMAKE_CXX_COMPILER=g++-13

      - name: Build
        run: cmake --build --preset build-linux-gcc-debug

      - name: Test
        run: ctest --preset test-linux-gcc-debug

  macos-clang:
    # CI_CONTRACT: macos-clang-debug@1
    needs: configure-check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install dependencies
        run: |
          brew update
          brew install cmake ninja wxwidgets googletest imagemagick

      - name: Configure
        run: cmake --preset macos-clang-debug

      - name: Build
        run: cmake --build --preset build-macos-clang-debug

      - name: Test
        run: ctest --preset test-macos-clang-debug

      - name: Package
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        run: |
          cd build/macos-clang-debug
          cpack -G "DragNDrop;TGZ"

      - name: Organize packages
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        run: |
          mkdir -p dist/macos
          mv dist/*.dmg dist/macos/ 2>/dev/null || true
          mv dist/*.tar.gz dist/macos/ 2>/dev/null || true

      - name: Upload Artifacts
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: macos-clang-packages
          path: dist/macos/*
